<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" fill="none" role="img" aria-label="Fast payments image">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAFBFF"/>
      <stop offset="100%" stop-color="#D8EEFF"/>
    </linearGradient>
    <style>
      .track path { animation: dash 2.2s linear infinite; stroke-dasharray: 8 12; }
      .coin { animation: glide 2.2s ease-in-out infinite; }
      .bar { animation: bump 2.6s ease-in-out infinite; transform-origin: bottom; }
      .bar:nth-child(2){animation-delay:0.2s}
      .bar:nth-child(3){animation-delay:0.35s}
      .bar:nth-child(4){animation-delay:0.5s}
      @keyframes dash { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-40} }
      @keyframes glide { 0%{transform:translateX(0)} 50%{transform:translateX(184px)} 100%{transform:translateX(0)} }
      @keyframes bump { 0%,100%{transform:scaleY(0.55)} 45%{transform:scaleY(1)} }
    </style>
  </defs>

  <rect width="640" height="420" rx="34" fill="url(#bg)"/>
  <rect x="82" y="120" width="190" height="186" rx="30" fill="#F4FAFF" stroke="#BFDDF5"/>
  <rect x="366" y="120" width="190" height="186" rx="30" fill="#F4FAFF" stroke="#BFDDF5"/>

  <g class="track">
    <path d="M282 212H352" stroke="#0F172A" stroke-width="8" stroke-linecap="round"/>
    <path d="M282 188H352" stroke="#4D6EA4" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g class="coin" transform="translate(290 188)">
    <circle cx="0" cy="24" r="22" fill="#0F172A"/>
    <text x="0" y="30" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#F8FAFC">XLM</text>
  </g>

  <g transform="translate(108 236)">
    <rect class="bar" x="0" y="26" width="28" height="60" rx="10" fill="#A0C4F8"/>
    <rect class="bar" x="38" y="8" width="28" height="78" rx="10" fill="#0F172A"/>
    <rect class="bar" x="76" y="34" width="28" height="52" rx="10" fill="#A0C4F8"/>
    <rect class="bar" x="114" y="16" width="28" height="70" rx="10" fill="#0F172A"/>
  </g>

  <path d="M416 222L438 244L496 186" stroke="#0F172A" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
